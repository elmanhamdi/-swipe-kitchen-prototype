<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Room — Three.js</title>
    <style>
      /**
       * Full-viewport “device frame”: black letterboxing simulates a portrait phone.
       * Inner stage keeps 9:16 and stays centered.
       */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #device-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      /* 9:16 portrait canvas area — height-limited on wide screens, width-limited on tall screens */
      #canvas-stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        max-width: 100%;
        max-height: 100%;
        background: #111;
      }

      #canvas-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* Overlay UI: ingredient tray (bottom). Canvas stays full-bleed behind. */
      #burger-ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .burger-ui__bar {
        pointer-events: auto;
        padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0));
        background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.2));
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        max-height: 38%;
      }

      .burger-ui__btn {
        border: none;
        border-radius: 10px;
        padding: 10px 6px;
        font: 600 11px/1.2 system-ui, sans-serif;
        color: #1a1a1a;
        background: #f4f1ea;
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 0.12s ease, filter 0.12s ease;
      }

      .burger-ui__btn:active {
        transform: translateY(1px);
        filter: brightness(0.94);
      }

      .burger-ui__btn--punch {
        animation: btnPunch 0.28s ease-out;
      }

      @keyframes btnPunch {
        0% {
          transform: scale(1);
        }
        35% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      .burger-ui__btn--trash {
        grid-column: span 2;
        background: #4a2d2d;
        color: #f5e6e6;
      }

      .burger-ui__hud {
        position: absolute;
        top: 6px;
        left: 6px;
        right: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        pointer-events: none;
        z-index: 3;
      }

      .burger-ui__coins {
        font: 700 13px/1.2 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
        min-width: 5rem;
        pointer-events: none;
      }

      .burger-ui__meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        min-width: 4.5rem;
        pointer-events: none;
        font: 700 12px/1.1 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
      }

      .burger-ui__meta span:last-child {
        font-weight: 600;
        font-size: 11px;
        opacity: 0.88;
      }

      .burger-ui__status {
        flex: 1;
        text-align: center;
        font: 12px/1.3 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.65);
        pointer-events: none;
      }

      .burger-ui__serve {
        pointer-events: auto;
        border: none;
        border-radius: 10px;
        padding: 8px 12px;
        font: 700 12px system-ui, sans-serif;
        background: linear-gradient(180deg, #f0c85c, #d9a62e);
        color: #1f1608;
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        cursor: pointer;
        touch-action: manipulation;
      }

      .burger-ui__serve:active {
        transform: translateY(1px);
      }

      .floating-bonus-text {
        position: absolute;
        left: 0;
        top: 0;
        font: 800 15px/1.1 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 12px rgba(0, 0, 0, 0.85),
          0 2px 4px rgba(0, 0, 0, 0.9);
        white-space: nowrap;
        will-change: transform, opacity;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.169.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="device-frame">
      <div id="canvas-stage">
        <div id="burger-ui" aria-label="Burger ingredients">
          <div class="burger-ui__hud">
            <div class="burger-ui__coins" id="coins-display" aria-live="polite">Coins: 0</div>
            <div class="burger-ui__status" id="burger-status" aria-live="polite"></div>
            <div class="burger-ui__meta" aria-live="polite">
              <span id="game-timer">45s</span>
              <span id="game-combo">1x</span>
            </div>
            <button type="button" class="burger-ui__serve" id="serve-btn" title="Give burger to a matching customer">
              Serve
            </button>
          </div>
          <div class="burger-ui__bar">
            <button type="button" class="burger-ui__btn" data-ingredient="bun_bottom" title="Bottom bun">
              Bottom
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="lettuce" title="Lettuce">
              Lettuce
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="tomato" title="Tomato">
              Tomato
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="cheese" title="Cheese">
              Cheese
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="meat" title="Patty">
              Meat
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="bun_top" title="Top bun">
              Top
            </button>
            <button type="button" class="burger-ui__btn burger-ui__btn--trash" id="burger-trash" title="Clear burger">
              Trash
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
