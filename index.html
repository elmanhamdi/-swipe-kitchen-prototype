<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Room — Three.js</title>
    <style>
      /**
       * Full-viewport “device frame”: black letterboxing simulates a portrait phone.
       * Inner stage keeps 9:16 and stays centered.
       */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #device-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      /* 9:16 portrait canvas area — height-limited on wide screens, width-limited on tall screens */
      #canvas-stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        max-width: 100%;
        max-height: 100%;
        background: #111;
      }

      #canvas-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* Overlay UI: ingredient tray (bottom). Canvas stays full-bleed behind. */
      #burger-ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .burger-ui__bar {
        pointer-events: auto;
        padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0));
        background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.2));
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        max-height: 38%;
      }

      .burger-ui__btn {
        border: none;
        border-radius: 10px;
        padding: 10px 6px;
        font: 600 11px/1.2 system-ui, sans-serif;
        color: #1a1a1a;
        background: #f4f1ea;
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 0.12s ease, filter 0.12s ease;
      }

      .burger-ui__btn:active {
        transform: translateY(1px);
        filter: brightness(0.94);
      }

      .burger-ui__btn--punch {
        animation: btnPunch 0.28s ease-out;
      }

      @keyframes btnPunch {
        0% {
          transform: scale(1);
        }
        35% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      .burger-ui__btn--trash {
        grid-column: span 2;
        background: #4a2d2d;
        color: #f5e6e6;
      }

      /* ---- Polished top HUD (scales with 9:16 stage) ---- */
      .game-hud {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        z-index: 3;
        pointer-events: none;
        padding: max(6px, env(safe-area-inset-top, 0px)) max(10px, env(safe-area-inset-right, 0px)) 0
          max(10px, env(safe-area-inset-left, 0px));
      }

      .game-hud__top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: clamp(4px, 1.2vmin, 10px);
        min-height: clamp(3rem, 11vmin, 4.25rem);
      }

      .game-hud__serve {
        pointer-events: auto;
        justify-self: start;
        align-self: center;
        border: none;
        border-radius: clamp(8px, 2vmin, 12px);
        padding: clamp(7px, 1.8vmin, 10px) clamp(10px, 2.5vmin, 14px);
        font: 700 clamp(11px, 2.8vmin, 13px) / 1 system-ui, sans-serif;
        background: linear-gradient(180deg, #f0c85c, #d9a62e);
        color: #1f1608;
        box-shadow:
          0 2px 0 rgba(0, 0, 0, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset;
        cursor: pointer;
        touch-action: manipulation;
      }

      .game-hud__serve:active {
        transform: translateY(1px);
      }

      .game-hud__timer-slot {
        justify-self: center;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(2px, 0.6vmin, 5px);
        pointer-events: none;
      }

      .game-hud__timer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 1.6vmin, 10px);
        padding: clamp(4px, 1vmin, 8px) clamp(10px, 2.5vmin, 16px);
        border-radius: clamp(12px, 3vmin, 18px);
        background: rgba(12, 14, 22, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }

      .game-hud__timer-icon {
        flex-shrink: 0;
        width: clamp(1.35rem, 4.2vmin, 2rem);
        height: clamp(1.35rem, 4.2vmin, 2rem);
        color: rgba(186, 230, 255, 0.95);
        opacity: 0.95;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
      }

      .game-hud__timer-count {
        display: flex;
        align-items: baseline;
        gap: 1px;
      }

      .game-hud__timer-digits {
        font: 800 clamp(1.75rem, 7.5vmin, 3rem) / 1.05 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
      }

      .game-hud__timer-suffix {
        font: 700 clamp(0.65rem, 2.2vmin, 0.85rem) / 1 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.55);
      }

      .game-hud__timer--low .game-hud__timer-digits {
        color: #ffd4a8;
      }

      .game-hud__timer--low {
        animation: hudTimerPulse 1.1s ease-in-out infinite;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 200, 120, 0.25) inset,
          0 0 20px rgba(255, 140, 60, 0.2);
      }

      .game-hud__timer--critical .game-hud__timer-digits {
        color: #ff9a8a;
      }

      .game-hud__timer--critical {
        animation: hudTimerPulse 0.65s ease-in-out infinite;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 100, 80, 0.35) inset,
          0 0 28px rgba(255, 60, 40, 0.28);
      }

      @keyframes hudTimerPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.045);
        }
      }

      .game-hud__combo {
        font: 800 clamp(10px, 2.5vmin, 12px) / 1 system-ui, sans-serif;
        letter-spacing: 0.06em;
        color: rgba(255, 216, 120, 0.95);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
        padding: 3px clamp(8px, 2vmin, 11px);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 200, 100, 0.2);
      }

      .game-hud__coins {
        justify-self: end;
        align-self: center;
        display: flex;
        align-items: center;
        flex-direction: row-reverse;
        gap: clamp(6px, 1.5vmin, 9px);
        padding: clamp(6px, 1.6vmin, 10px) clamp(10px, 2.6vmin, 14px);
        border-radius: clamp(12px, 3vmin, 18px);
        background: rgba(12, 14, 22, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        pointer-events: none;
      }

      .game-hud__coins-icon {
        flex-shrink: 0;
        width: clamp(1.25rem, 3.8vmin, 1.85rem);
        height: clamp(1.25rem, 3.8vmin, 1.85rem);
        filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.45));
      }

      .game-hud__coins-value {
        font: 800 clamp(1.1rem, 4.2vmin, 1.65rem) / 1 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        color: #ffe566;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
        min-width: 1.25em;
        text-align: right;
      }

      .game-hud__coins-value--pop {
        animation: hudCoinPop 0.38s cubic-bezier(0.34, 1.4, 0.64, 1);
      }

      @keyframes hudCoinPop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.18);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-hud__timer--low,
        .game-hud__timer--critical {
          animation: none;
        }

        .game-hud__coins-value--pop {
          animation-duration: 0.01ms;
        }
      }

      .game-hud__status {
        margin-top: clamp(6px, 1.5vmin, 10px);
        padding: 0 clamp(4px, 1vmin, 8px);
        text-align: center;
        font: 600 clamp(11px, 2.8vmin, 13px) / 1.35 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.75);
        pointer-events: none;
      }

      .floating-bonus-text {
        position: absolute;
        left: 0;
        top: 0;
        font: 800 15px/1.1 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 12px rgba(0, 0, 0, 0.85),
          0 2px 4px rgba(0, 0, 0, 0.9);
        white-space: nowrap;
        will-change: transform, opacity;
      }

      .floating-bonus-text--pop {
        font-size: 16px;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.35));
      }

      .floating-bonus-text--combo {
        font-size: 18px;
        font-weight: 900;
        filter: drop-shadow(0 0 10px rgba(255, 200, 80, 0.55));
      }

      .coin-flyout {
        position: absolute;
        left: 0;
        top: 0;
        font-size: 22px;
        line-height: 1;
        pointer-events: none;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.65));
        will-change: transform, opacity;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="device-frame">
      <div id="canvas-stage">
        <div id="burger-ui" aria-label="Burger ingredients">
          <div class="game-hud" role="region" aria-label="Game status">
            <div class="game-hud__top">
              <button type="button" class="game-hud__serve" id="serve-btn" title="Give burger to a matching customer">
                Serve
              </button>
              <div class="game-hud__timer-slot">
                <div class="game-hud__timer" id="game-timer-block" aria-live="polite" aria-atomic="true">
                  <svg class="game-hud__timer-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.75" class="game-hud__timer-icon-ring" />
                    <path
                      d="M12 8.5V13l3 2"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path d="M9 3.5h6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
                    <path d="M12 3.5V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                  </svg>
                  <div class="game-hud__timer-count">
                    <span id="game-timer" class="game-hud__timer-digits">45</span>
                    <span class="game-hud__timer-suffix" aria-hidden="true">s</span>
                  </div>
                </div>
                <div class="game-hud__combo" id="game-combo" aria-live="polite">1×</div>
              </div>
              <div class="game-hud__coins" id="coins-display" aria-live="polite" aria-atomic="true">
                <span id="coins-value" class="game-hud__coins-value">0</span>
                <svg class="game-hud__coins-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <defs>
                    <linearGradient id="hud-coin-g" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#fff4a8" />
                      <stop offset="45%" stop-color="#e8b020" />
                      <stop offset="100%" stop-color="#b8860b" />
                    </linearGradient>
                  </defs>
                  <circle cx="12" cy="12" r="9.5" fill="url(#hud-coin-g)" stroke="#7a5a10" stroke-width="1" />
                  <text
                    x="12"
                    y="13.5"
                    text-anchor="middle"
                    font-size="10"
                    font-weight="800"
                    fill="#5c4308"
                    font-family="system-ui, sans-serif"
                  >
                    $
                  </text>
                </svg>
              </div>
            </div>
            <p class="game-hud__status" id="burger-status" aria-live="polite"></p>
          </div>
          <div class="burger-ui__bar">
            <button type="button" class="burger-ui__btn" data-ingredient="bun_bottom" title="Bottom bun">
              Bottom
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="lettuce" title="Lettuce">
              Lettuce
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="tomato" title="Tomato">
              Tomato
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="cheese" title="Cheese">
              Cheese
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="meat" title="Patty">
              Meat
            </button>
            <button type="button" class="burger-ui__btn" data-ingredient="bun_top" title="Top bun">
              Top
            </button>
            <button type="button" class="burger-ui__btn burger-ui__btn--trash" id="burger-trash" title="Clear burger">
              Trash
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
