<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Room — Three.js</title>
    <style>
      /**
       * Full-viewport “device frame”: black letterboxing simulates a portrait phone.
       * Inner stage keeps 9:16 and stays centered.
       */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #device-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      /* 9:16 portrait canvas area — height-limited on wide screens, width-limited on tall screens */
      #canvas-stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        max-width: 100%;
        max-height: 100%;
        background: #111;
      }

      #canvas-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* HUD + game-over overlay (ingredients are 3D in-scene). */
      #burger-ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      #game-over-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.35s ease,
          visibility 0.35s;
        overflow: hidden;
      }

      /* Radial burst + rings behind the TIME UP panel */
      .game-over-splash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .game-over-splash__burst {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 160%;
        height: 160%;
        transform: translate(-50%, -50%) scale(0.15);
        opacity: 0;
        background: radial-gradient(
          circle closest-side,
          rgba(255, 220, 120, 0.75) 0%,
          rgba(255, 140, 60, 0.35) 28%,
          rgba(255, 80, 120, 0.12) 48%,
          transparent 70%
        );
        filter: blur(0px);
      }

      .game-over-splash__ring {
        position: absolute;
        left: 50%;
        top: 42%;
        width: min(120vmin, 520px);
        height: min(120vmin, 520px);
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
        border-radius: 50%;
        border: 3px solid rgba(255, 230, 160, 0.85);
        box-shadow:
          0 0 40px rgba(255, 200, 80, 0.5),
          inset 0 0 60px rgba(255, 255, 255, 0.15);
      }

      .game-over-splash__confetti {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .game-over-splash__confetti span {
        position: absolute;
        left: var(--x, 50%);
        top: -8%;
        width: var(--w, 8px);
        height: var(--h, 12px);
        border-radius: 2px;
        background: var(--c, #ffd54a);
        opacity: 0;
        transform: rotate(var(--r, 0deg));
        animation: none;
      }

      .game-over-splash--animate .game-over-splash__burst {
        animation: goSplashBurst 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .game-over-splash--animate .game-over-splash__ring {
        animation: goSplashRing 0.95s cubic-bezier(0.2, 0.9, 0.35, 1) forwards;
      }

      .game-over-splash--animate .game-over-splash__confetti span {
        animation: goConfettiFall 1.15s ease-out forwards;
        animation-delay: var(--d, 0ms);
      }

      @keyframes goSplashBurst {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.12);
          filter: blur(4px);
        }
        35% {
          opacity: 1;
          filter: blur(0px);
        }
        100% {
          opacity: 0.55;
          transform: translate(-50%, -50%) scale(1);
          filter: blur(1px);
        }
      }

      @keyframes goSplashRing {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.25);
        }
        25% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.35);
        }
      }

      @keyframes goConfettiFall {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        12% {
          opacity: 1;
        }
        100% {
          opacity: 0.85;
          transform: translate3d(var(--dx, 0px), 120vh, 0) rotate(var(--r2, 360deg));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-over-splash--animate .game-over-splash__burst,
        .game-over-splash--animate .game-over-splash__ring,
        .game-over-splash--animate .game-over-splash__confetti span {
          animation-duration: 0.01ms;
        }
      }

      #game-over-overlay.game-over-overlay--visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .game-over-panel {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: clamp(18px, 5vmin, 28px) clamp(22px, 6vmin, 36px);
        border-radius: clamp(16px, 4vmin, 22px);
        background: linear-gradient(165deg, rgba(36, 32, 40, 0.96), rgba(22, 20, 26, 0.98));
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        transform: scale(0.82);
        opacity: 0;
        transition:
          transform 0.42s cubic-bezier(0.34, 1.35, 0.64, 1),
          opacity 0.35s ease;
        max-width: 88%;
      }

      #game-over-overlay.game-over-overlay--visible .game-over-panel {
        transform: scale(1);
        opacity: 1;
      }

      .game-over-panel__title {
        margin: 0 0 clamp(8px, 2vmin, 12px);
        font: 900 clamp(1.75rem, 7vmin, 2.35rem) / 1.05 system-ui, sans-serif;
        letter-spacing: 0.06em;
        color: #fff;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
      }

      .game-over-panel__coins {
        margin: 0 0 clamp(18px, 4vmin, 24px);
        font: 700 clamp(1rem, 3.2vmin, 1.2rem) system-ui, sans-serif;
        color: #ffd873;
      }

      .game-over-panel__btn {
        border: none;
        border-radius: clamp(12px, 3vmin, 16px);
        padding: clamp(12px, 3vmin, 16px) clamp(28px, 8vmin, 40px);
        font: 800 clamp(14px, 3.5vmin, 17px) system-ui, sans-serif;
        color: #1a1408;
        background: linear-gradient(180deg, #f0c85c, #d9a62e);
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
        cursor: pointer;
        touch-action: manipulation;
      }

      .game-over-panel__btn:active {
        transform: translateY(2px);
      }

      /* ---- Polished top HUD (scales with 9:16 stage) ---- */
      .game-hud {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        z-index: 3;
        pointer-events: none;
        padding: max(6px, env(safe-area-inset-top, 0px)) max(10px, env(safe-area-inset-right, 0px)) 0
          max(10px, env(safe-area-inset-left, 0px));
      }

      .game-hud__top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: clamp(4px, 1.2vmin, 10px);
        min-height: clamp(3rem, 11vmin, 4.25rem);
      }

      .game-hud__spacer {
        justify-self: start;
        width: clamp(52px, 14vmin, 72px);
        height: 1px;
        visibility: hidden;
        pointer-events: none;
      }

      .game-hud__timer-slot {
        justify-self: center;
        max-width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .game-hud__timer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 1.6vmin, 10px);
        padding: clamp(4px, 1vmin, 8px) clamp(10px, 2.5vmin, 16px);
        border-radius: clamp(12px, 3vmin, 18px);
        background: rgba(12, 14, 22, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }

      .game-hud__timer-icon {
        flex-shrink: 0;
        width: clamp(1.35rem, 4.2vmin, 2rem);
        height: clamp(1.35rem, 4.2vmin, 2rem);
        color: rgba(186, 230, 255, 0.95);
        opacity: 0.95;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
      }

      .game-hud__timer-count {
        display: flex;
        align-items: baseline;
        gap: 1px;
      }

      .game-hud__timer-digits {
        font: 800 clamp(1.75rem, 7.5vmin, 3rem) / 1.05 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
      }

      .game-hud__timer-suffix {
        font: 700 clamp(0.65rem, 2.2vmin, 0.85rem) / 1 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.55);
      }

      .game-hud__timer--low .game-hud__timer-digits {
        color: #ffd4a8;
      }

      .game-hud__timer--low {
        animation: hudTimerPulse 1.1s ease-in-out infinite;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 200, 120, 0.25) inset,
          0 0 20px rgba(255, 140, 60, 0.2);
      }

      .game-hud__timer--critical .game-hud__timer-digits {
        color: #ff9a8a;
      }

      .game-hud__timer--critical {
        animation: hudTimerPulse 0.65s ease-in-out infinite;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 100, 80, 0.35) inset,
          0 0 28px rgba(255, 60, 40, 0.28);
      }

      @keyframes hudTimerPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.045);
        }
      }

      .game-hud__coins {
        justify-self: end;
        align-self: center;
        display: flex;
        align-items: center;
        flex-direction: row-reverse;
        gap: clamp(6px, 1.5vmin, 9px);
        padding: clamp(6px, 1.6vmin, 10px) clamp(10px, 2.6vmin, 14px);
        border-radius: clamp(12px, 3vmin, 18px);
        background: rgba(12, 14, 22, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        pointer-events: none;
      }

      .game-hud__coins-icon {
        flex-shrink: 0;
        width: clamp(1.25rem, 3.8vmin, 1.85rem);
        height: clamp(1.25rem, 3.8vmin, 1.85rem);
        filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.45));
      }

      .game-hud__coins-value {
        font: 800 clamp(1.1rem, 4.2vmin, 1.65rem) / 1 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        color: #ffe566;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
        min-width: 1.25em;
        text-align: right;
      }

      .game-hud__coins-value--pop {
        animation: hudCoinPop 0.38s cubic-bezier(0.34, 1.4, 0.64, 1);
      }

      @keyframes hudCoinPop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.18);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-hud__timer--low,
        .game-hud__timer--critical {
          animation: none;
        }

        .game-hud__coins-value--pop {
          animation-duration: 0.01ms;
        }
      }

      .game-hud__status {
        margin-top: clamp(6px, 1.5vmin, 10px);
        padding: 0 clamp(4px, 1vmin, 8px);
        text-align: center;
        font: 600 clamp(11px, 2.8vmin, 13px) / 1.35 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.75);
        pointer-events: none;
      }

      .floating-bonus-text {
        position: absolute;
        left: 0;
        top: 0;
        font: 800 15px/1.1 system-ui, sans-serif;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 12px rgba(0, 0, 0, 0.85),
          0 2px 4px rgba(0, 0, 0, 0.9);
        white-space: nowrap;
        will-change: transform, opacity;
      }

      .floating-bonus-text--pop {
        font-size: 16px;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.35));
      }

      .floating-bonus-text--combo {
        font-size: 18px;
        font-weight: 900;
        filter: drop-shadow(0 0 10px rgba(255, 200, 80, 0.55));
      }

      .floating-bonus-text--combo-serve {
        font-size: clamp(20px, 5.5vmin, 34px);
        font-weight: 900;
        letter-spacing: 0.04em;
        filter: drop-shadow(0 0 14px rgba(255, 210, 80, 0.65)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.85));
      }

      #shop-open-splash {
        position: absolute;
        inset: 0;
        z-index: 11;
        pointer-events: none;
        background:
          radial-gradient(ellipse 85% 55% at 50% 36%, rgba(255, 230, 150, 0.65) 0%, transparent 58%),
          radial-gradient(ellipse 50% 40% at 72% 48%, rgba(130, 210, 255, 0.35) 0%, transparent 50%),
          radial-gradient(ellipse 45% 38% at 28% 52%, rgba(255, 160, 120, 0.28) 0%, transparent 48%);
        opacity: 0;
        visibility: hidden;
      }

      #shop-open-splash.shop-open-splash--show {
        visibility: visible;
        animation: shopOpenSplashAnim 0.88s ease-out forwards;
      }

      @keyframes shopOpenSplashAnim {
        0% {
          opacity: 0;
          transform: scale(1.06);
        }
        22% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #shop-open-splash.shop-open-splash--show {
          animation-duration: 0.35s;
        }
      }

      .coin-flyout {
        position: absolute;
        left: 0;
        top: 0;
        font-size: 22px;
        line-height: 1;
        pointer-events: none;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.65));
        will-change: transform, opacity;
      }

      /* Bottom-left how-to-play (pauses timer while open) */
      .hud-info-btn {
        position: absolute;
        left: max(10px, env(safe-area-inset-left, 0px));
        bottom: max(10px, env(safe-area-inset-bottom, 0px));
        z-index: 8;
        width: clamp(40px, 11vmin, 52px);
        height: clamp(40px, 11vmin, 52px);
        padding: 0;
        border: none;
        border-radius: 50%;
        font: 800 clamp(18px, 5vmin, 24px) / 1 Georgia, 'Times New Roman', serif;
        font-style: italic;
        color: rgba(255, 255, 255, 0.95);
        background: rgba(18, 20, 32, 0.72);
        box-shadow:
          0 4px 20px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset;
        cursor: pointer;
        touch-action: manipulation;
        pointer-events: auto;
      }

      .hud-info-btn:active {
        transform: scale(0.96);
      }

      #hud-info-modal {
        position: absolute;
        inset: 0;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px))
          max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.25s ease,
          visibility 0.25s;
      }

      #hud-info-modal.hud-info-modal--visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .hud-info-modal__panel {
        position: relative;
        max-width: min(92%, 340px);
        padding: clamp(18px, 4vmin, 24px) clamp(20px, 5vmin, 28px) clamp(20px, 5vmin, 28px);
        border-radius: clamp(14px, 3.5vmin, 20px);
        background: linear-gradient(165deg, rgba(32, 30, 38, 0.97), rgba(18, 16, 24, 0.98));
        box-shadow:
          0 16px 48px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      }

      .hud-info-modal__text {
        margin: 0;
        font: 600 clamp(13px, 3.2vmin, 15px) / 1.45 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.92);
        text-align: center;
      }

      .hud-info-modal__close {
        position: absolute;
        top: clamp(8px, 2vmin, 12px);
        right: clamp(8px, 2vmin, 12px);
        width: clamp(36px, 9vmin, 44px);
        height: clamp(36px, 9vmin, 44px);
        padding: 0;
        border: none;
        border-radius: 10px;
        font: 700 1.5rem / 1 system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        touch-action: manipulation;
      }

      .hud-info-modal__close:active {
        background: rgba(255, 255, 255, 0.14);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="device-frame">
      <div id="canvas-stage">
        <div id="burger-ui" aria-label="Game UI">
          <div id="shop-open-splash" aria-hidden="true"></div>
          <div id="game-over-overlay" aria-hidden="true">
            <div class="game-over-splash" aria-hidden="true">
              <div class="game-over-splash__burst"></div>
              <div class="game-over-splash__ring"></div>
              <div class="game-over-splash__confetti" aria-hidden="true">
                <span style="--x: 12%; --w: 7px; --h: 14px; --c: #ffcc4d; --r: 12deg; --r2: 200deg; --dx: -12px; --d: 0ms"></span>
                <span style="--x: 22%; --w: 9px; --h: 10px; --c: #ff6b6b; --r: -8deg; --r2: -240deg; --dx: 8px; --d: 40ms"></span>
                <span style="--x: 35%; --w: 6px; --h: 16px; --c: #74c0fc; --r: 25deg; --r2: 300deg; --dx: -6px; --d: 20ms"></span>
                <span style="--x: 48%; --w: 10px; --h: 8px; --c: #ffd43b; --r: -15deg; --r2: 180deg; --dx: 4px; --d: 60ms"></span>
                <span style="--x: 58%; --w: 8px; --h: 12px; --c: #a9e34b; --r: 40deg; --r2: -200deg; --dx: -10px; --d: 10ms"></span>
                <span style="--x: 72%; --w: 7px; --h: 11px; --c: #ff922b; --r: -22deg; --r2: 260deg; --dx: 14px; --d: 50ms"></span>
                <span style="--x: 84%; --w: 9px; --h: 9px; --c: #e599f7; --r: 8deg; --r2: -320deg; --dx: -4px; --d: 30ms"></span>
                <span style="--x: 18%; --w: 6px; --h: 10px; --c: #fff3bf; --r: 55deg; --r2: 140deg; --dx: 18px; --d: 70ms"></span>
                <span style="--x: 92%; --w: 8px; --h: 13px; --c: #69db7c; --r: -35deg; --r2: 220deg; --dx: -16px; --d: 25ms"></span>
                <span style="--x: 65%; --w: 7px; --h: 9px; --c: #ffa8a8; --r: 18deg; --r2: -160deg; --dx: 6px; --d: 45ms"></span>
              </div>
            </div>
            <div class="game-over-panel">
              <h2 class="game-over-panel__title">TIME UP</h2>
              <p class="game-over-panel__coins" id="game-over-coins">0 coins</p>
              <button type="button" class="game-over-panel__btn" id="play-again-btn">Play Again</button>
            </div>
          </div>
          <div class="game-hud" role="region" aria-label="Game status">
            <div class="game-hud__top">
              <div class="game-hud__spacer" aria-hidden="true"></div>
              <div class="game-hud__timer-slot">
                <div class="game-hud__timer" id="game-timer-block" aria-live="polite" aria-atomic="true">
                  <svg class="game-hud__timer-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.75" class="game-hud__timer-icon-ring" />
                    <path
                      d="M12 8.5V13l3 2"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path d="M9 3.5h6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
                    <path d="M12 3.5V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                  </svg>
                  <div class="game-hud__timer-count">
                    <span id="game-timer" class="game-hud__timer-digits">45</span>
                    <span class="game-hud__timer-suffix" aria-hidden="true">s</span>
                  </div>
                </div>
              </div>
              <div class="game-hud__coins" id="coins-display" aria-live="polite" aria-atomic="true">
                <span id="coins-value" class="game-hud__coins-value">0</span>
                <svg class="game-hud__coins-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <defs>
                    <linearGradient id="hud-coin-g" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#fff4a8" />
                      <stop offset="45%" stop-color="#e8b020" />
                      <stop offset="100%" stop-color="#b8860b" />
                    </linearGradient>
