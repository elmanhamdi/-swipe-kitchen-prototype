<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Room — Three.js</title>
    <style>
      /**
       * Full-viewport “device frame”: black letterboxing simulates a portrait phone.
       * Inner stage keeps 9:16 and stays centered.
       */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #device-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      /* 9:16 portrait canvas area — height-limited on wide screens, width-limited on tall screens */
      #canvas-stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        max-width: 100%;
        max-height: 100%;
        background: #111;
      }

      #canvas-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* HUD + game-over overlay (ingredients are 3D in-scene). */
      #burger-ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      #game-over-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.35s ease,
          visibility 0.35s;
        overflow: hidden;
      }

      /* Radial burst + rings behind the TIME UP panel */
      .game-over-splash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .game-over-splash__burst {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 160%;
        height: 160%;
        transform: translate(-50%, -50%) scale(0.15);
        opacity: 0;
        background: radial-gradient(
          circle closest-side,
          rgba(255, 220, 120, 0.75) 0%,
          rgba(255, 140, 60, 0.35) 28%,
          rgba(255, 80, 120, 0.12) 48%,
          transparent 70%
        );
        filter: blur(0px);
      }

      .game-over-splash__ring {
        position: absolute;
        left: 50%;
        top: 42%;
        width: min(120vmin, 520px);
        height: min(120vmin, 520px);
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
        border-radius: 50%;
        border: 3px solid rgba(255, 230, 160, 0.85);
        box-shadow:
          0 0 40px rgba(255, 200, 80, 0.5),
          inset 0 0 60px rgba(255, 255, 255, 0.15);
      }

      .game-over-splash__confetti {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .game-over-splash__confetti span {
        position: absolute;
        left: var(--x, 50%);
        top: -8%;
        width: var(--w, 8px);
        height: var(--h, 12px);
        border-radius: 2px;
        background: var(--c, #ffd54a);
        opacity: 0;
        transform: rotate(var(--r, 0deg));
        animation: none;
      }

      .game-over-splash--animate .game-over-splash__burst {
        animation: goSplashBurst 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .game-over-splash--animate .game-over-splash__ring {
        animation: goSplashRing 0.95s cubic-bezier(0.2, 0.9, 0.35, 1) forwards;
      }

      .game-over-splash--animate .game-over-splash__confetti span {
        animation: goConfettiFall 1.15s ease-out forwards;
        animation-delay: var(--d, 0ms);
      }

      @keyframes goSplashBurst {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.12);
          filter: blur(4px);
        }
        35% {
          opacity: 1;
          filter: blur(0px);
        }
        100% {
          opacity: 0.55;
          transform: translate(-50%, -50%) scale(1);
          filter: blur(1px);
        }
      }

      @keyframes goSplashRing {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.25);
        }
        25% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.35);
        }
      }

      @keyframes goConfettiFall {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        12% {
          opacity: 1;
        }
        100% {
          opacity: 0.85;
          transform: translate3d(var(--dx, 0px), 120vh, 0) rotate(var(--r2, 360deg));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-over-splash--animate .game-over-splash__burst,
        .game-over-splash--animate .game-over-splash__ring,
        .game-over-splash--animate .game-over-splash__confetti span {
          animation-duration: 0.01ms;
        }
      }

      #game-over-overlay.game-over-overlay--visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .game-over-panel {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: clamp(18px, 5vmin, 28px) clamp(22px, 6vmin, 36px);
        border-radius: clamp(16px, 4vmin, 22px);
        background: linear-gradient(165deg, rgba(36, 32, 40, 0.96), rgba(22, 20, 26, 0.98));
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        transform: scale(0.82);
        opacity: 0;
        transition:
          transform 0.42s cubic-bezier(0.34, 1.35, 0.64, 1),
          opacity 0.35s ease;
        max-width: 88%;
      }

      #game-over-overlay.game-over-overlay--visible .game-over-panel {
        transform: scale(1);
        opacity: 1;
      }

      .game-over-panel__title {
        margin: 0 0 clamp(8px, 2vmin, 12px);
        font: 900 clamp(1.75rem, 7vmin, 2.35rem) / 1.05 system-ui, sans-serif;
        letter-spacing: 0.06em;
        color: #fff;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
      }

      .game-over-panel__coins {
        margin: 0 0 clamp(18px, 4vmin, 24px);
        font: 700 clamp(1rem, 3.2vmin, 1.2rem) system-ui, sans-serif;
        color: #ffd873;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(8px, 2vmin, 10px);
      }

      .game-over-panel__btn {
        border: none;
        border-radius: 50%;
        cursor: pointer;
        touch-action: manipulation;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        transition: transform 0.12s ease;
      }

      .game-over-panel__btn:active {
        transform: translateY(2px) scale(0.95);
      }

      .game-over-panel__btns {
        display: flex;
        gap: clamp(16px, 4vmin, 24px);
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }

      .game-over-panel__btn--play {
        width: clamp(72px, 18vmin, 96px);
        height: clamp(72px, 18vmin, 96px);
        background: linear-gradient(180deg, #f0c85c, #d9a62e);
        box-shadow:
          0 4px 16px rgba(217, 166, 46, 0.45),
          0 0 0 3px rgba(255, 220, 100, 0.25);
      }

      .game-over-panel__btn--play .game-over-panel__btn-icon {
        width: clamp(36px, 9vmin, 48px);
        height: clamp(36px, 9vmin, 48px);
      }

      .game-over-panel__btn--shop {
        width: clamp(52px, 13vmin, 68px);
        height: clamp(52px, 13vmin, 68px);
        background: linear-gradient(180deg, #ffffff, #e8e8e8);
        box-shadow:
          0 4px 14px rgba(0, 0, 0, 0.2),
          0 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .game-over-panel__btn--shop .game-over-panel__btn-icon {
        width: clamp(24px, 6vmin, 32px);
        height: clamp(24px, 6vmin, 32px);
      }

      .game-over-panel__btn-icon,
      .ui-inline-icon {
        width: clamp(18px, 4.2vmin, 24px);
        height: clamp(18px, 4.2vmin, 24px);
        object-fit: contain;
        flex-shrink: 0;
      }

      /* ──── Shop overlay ──────────────────────────────── */
      #shop-overlay {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.72);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }
      #shop-overlay.shop-overlay--visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .shop-panel {
        position: relative;
        width: min(96%, 420px);
        max-height: 88vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(160deg, rgba(30, 22, 18, 0.97), rgba(48, 34, 26, 0.97));
        border-radius: clamp(14px, 3vmin, 20px);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        overflow: hidden;
        transform: scale(0.9);
        transition: transform 0.25s ease;
      }
      #shop-overlay.shop-overlay--visible .shop-panel {
        transform: scale(1);
      }

      .shop-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: clamp(10px, 2.5vmin, 16px) clamp(14px, 3vmin, 20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .shop-header__title {
        margin: 0;
        font: 900 clamp(1.1rem, 4vmin, 1.4rem) system-ui, sans-serif;
        color: #fff;
        letter-spacing: 0.08em;
      }
      .shop-header__coins {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font: 700 clamp(0.85rem, 2.8vmin, 1rem) system-ui, sans-serif;
        color: #ffd873;
      }
      .shop-header__close {
        background: none;
        border: none;
        color: #aaa;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
      }
      .shop-header__close:hover { color: #fff; }

      .shop-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .shop-tab {
        flex: 1;
        padding: clamp(8px, 2vmin, 12px) 0;
        font: 700 clamp(0.72rem, 2.2vmin, 0.85rem) system-ui, sans-serif;
        color: #999;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        text-align: center;
        transition: color 0.15s, border-color 0.15s;
      }
      .shop-tab:hover { color: #ccc; }
      .shop-tab--active {
        color: #ffd873;
        border-bottom-color: #ffd873;
      }

      .shop-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(8px, 1.8vmin, 12px);
        padding: clamp(10px, 2.5vmin, 16px);
        overflow-y: auto;
        flex: 1;
        min-height: 0;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,215,115,0.35) transparent;
      }
      .shop-grid::-webkit-scrollbar { width: 6px; }
      .shop-grid::-webkit-scrollbar-track { background: transparent; }
      .shop-grid::-webkit-scrollbar-thumb {
        background: rgba(255,215,115,0.35);
        border-radius: 3px;
      }
      .shop-grid::-webkit-scrollbar-thumb:hover {
        background: rgba(255,215,115,0.55);
      }

      .shop-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: clamp(10px, 2vmin, 14px) 8px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: clamp(8px, 2vmin, 12px);
        border: 2px solid transparent;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .shop-card:hover { background: rgba(255, 255, 255, 0.08); }
      .shop-card--equipped {
        border-color: #ffd873;
        background: rgba(255, 216, 115, 0.08);
      }
      .shop-card--locked {
        opacity: 0.55;
      }

      .shop-card__swatch {
        width: clamp(52px, 12vmin, 68px);
        height: clamp(52px, 12vmin, 68px);
        border-radius: clamp(6px, 1.5vmin, 10px);
        border: 2px solid rgba(255, 255, 255, 0.12);
        object-fit: cover;
        image-rendering: pixelated;
      }

      .shop-card__name {
        font: 600 clamp(0.65rem, 2vmin, 0.78rem) system-ui, sans-serif;
        color: #ddd;
        text-align: center;
        line-height: 1.2;
      }
      .shop-card__price {
        font: 700 clamp(0.6rem, 1.8vmin, 0.72rem) system-ui, sans-serif;
        color: #ffd873;
      }
      .shop-card__badge {
        font: 700 clamp(0.55rem, 1.6vmin, 0.65rem) system-ui, sans-serif;
        padding: 2px 8px;
        border-radius: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .shop-card__badge--equipped {
        background: rgba(255, 216, 115, 0.2);
        color: #ffd873;
      }
      .shop-card__badge--owned {
        background: rgba(100, 200, 100, 0.15);
        color: #6cc070;
      }

      .shop-card__btn {
        border: none;
        border-radius: 8px;
        padding: 5px 14px;
        font: 700 clamp(0.6rem, 1.8vmin, 0.72rem) system-ui, sans-serif;
        cursor: pointer;
        touch-action: manipulation;
      }
      .shop-card__btn--buy {
        background: linear-gradient(180deg, #f0c85c, #d9a62e);
        color: #1a1408;
      }
      .shop-card__btn--buy:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .shop-card__btn--equip {
        background: linear-gradient(180deg, #74c0fc, #4a90d9);
        color: #0a1a2e;
      }
      .shop-card__btn--toggle-on {
        background: linear-gradient(180deg, #69db7c, #40a050);
        color: #0a2a0e;
      }
      .shop-card__btn--toggle-off {
        background: rgba(255, 255, 255, 0.1);
        color: #aaa;
      }

      /* ---- Polished top HUD (scales with 9:16 stage) ---- */
      .game-hud {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        z-index: 3;
        pointer-events: none;
        padding: max(6px, env(safe-area-inset-top, 0px)) 0 0 0;
        overflow: visible;
      }

      .game-hud::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: clamp(56px, 13vmin, 90px);
        background: linear-gradient(180deg, rgba(30, 16, 18, 0.45), transparent);
        pointer-events: none;
      }

      .game-hud__top {
        position: relative;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: start;
        gap: 0;
        min-height: clamp(3rem, 11vmin, 4.25rem);
        padding-top: clamp(2px, 0.5vmin, 4px);
      }

      .game-hud__timer-slot {
        justify-self: stretch;
        max-width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
        pointer-events: none;
        padding: 0 clamp(4px, 1vmin, 8px);
      }

      .game-hud__timer-anchor {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
        width: 100%;
      }

      .game-hud__timer {
        display: flex;
        align-items: center;
        gap: 0;
        overflow: visible;
        padding: clamp(5px, 1.2vmin, 9px) clamp(10px, 2.2vmin, 14px) clamp(5px, 1.2vmin, 9px) clamp(6px, 1.2vmin, 8px);
        border-radius: 999px;
        background: #f5c428;
        border: clamp(2px, 0.5vmin, 3px) solid #fff;
        box-shadow:
          0 0 0 clamp(2px, 0.5vmin, 3px) rgba(60, 30, 10, 0.45),
          0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .game-hud__timer-icon {
        flex-shrink: 0;
        width: clamp(1.6rem, 5vmin, 2.4rem);
        height: clamp(1.6rem, 5vmin, 2.4rem);
        object-fit: contain;
        margin-right: 0;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
        user-select: none;
        -webkit-user-drag: none;
      }

      .game-hud__timer-track {
        flex: 1;
        min-width: clamp(80px, 28vmin, 200px);
        height: clamp(14px, 3.8vmin, 22px);
        background: rgba(40, 20, 10, 0.6);
        border-radius: 0 999px 999px 0;
        padding: clamp(2px, 0.4vmin, 3px);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.35);
        margin-left: clamp(-8px, -1.6vmin, -5px);
      }

      .game-hud__timer-fill {
        height: 100%;
        border-radius: 0 999px 999px 0;
        background: #00e5ff;
        transition: width 0.15s linear, background-color 0.4s ease;
        box-shadow: 0 0 8px rgba(0, 229, 255, 0.35);
      }

      .game-hud__timer-bonus {
        position: absolute;
        right: clamp(12px, 3vmin, 20px);
        top: 50%;
        font: 900 clamp(1.1rem, 4vmin, 1.6rem) / 1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.05em;
        color: #4fc3f7;
        text-shadow:
          0 0 14px rgba(79, 195, 247, 0.8),
          0 0 28px rgba(33, 150, 243, 0.5),
          0 1px 3px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(-50%) scale(0.5);
        transform-origin: center center;
        transition:
          opacity 0.15s ease-out,
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
        white-space: nowrap;
        z-index: 10;
      }

      .game-hud__timer-bonus--show {
        opacity: 1;
        transform: translateY(-50%) scale(1.1);
      }

      .game-hud__timer--low {
        animation: hudTimerPulse 1.1s ease-in-out infinite;
      }

      .game-hud__timer--critical {
        animation: hudTimerPulse 0.65s ease-in-out infinite;
      }

      @keyframes hudTimerPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.045);
        }
      }

      .game-hud__timer--gain-pop {
        animation: hudTimerGainPop 0.22s ease-out;
      }

      @keyframes hudTimerGainPop {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.07);
        }
        100% {
          transform: scale(1);
        }
      }

      .game-hud__coins {
        justify-self: end;
        align-self: start;
        display: flex;
        align-items: center;
        flex-direction: row-reverse;
        gap: clamp(4px, 1vmin, 8px);
        padding: clamp(6px, 1.4vmin, 10px) clamp(8px, 2vmin, 14px) clamp(6px, 1.4vmin, 10px) clamp(12px, 2.8vmin, 18px);
        border-radius: 999px 0 0 999px;
        background: #f5c428;
        border: 2.5px solid #fff;
        border-right: none;
        box-shadow:
          -2px 0 0 0 rgba(60, 30, 10, 0.45),
          0 2px 0 0 rgba(60, 30, 10, 0.45),
          0 -2px 0 0 rgba(60, 30, 10, 0.45),
          -4px 6px 18px rgba(0, 0, 0, 0.25);
        pointer-events: none;
      }

      .game-hud__coins-icon {
        flex-shrink: 0;
        width: clamp(1.25rem, 3.8vmin, 1.85rem);
        height: clamp(1.25rem, 3.8vmin, 1.85rem);
        object-fit: contain;
        filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.45));
      }

      .game-hud__coins-value {
        font: 800 clamp(1rem, 3.8vmin, 1.5rem) / 1 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        color: #3e2723;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
        min-width: 1.25em;
        text-align: right;
      }

      .game-hud__coins-value--pop {
        animation: hudCoinPop 0.38s cubic-bezier(0.34, 1.4, 0.64, 1);
      }

      @keyframes hudCoinPop {
        0% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.18);
        }
        100% {
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-hud__timer--low,
        .game-hud__timer--critical {
          animation: none;
        }

        .game-hud__coins-value--pop {
          animation-duration: 0.01ms;
        }
      }

      .game-hud__status {
        margin-top: clamp(6px, 1.5vmin, 10px);
        padding: clamp(8px, 1.8vmin, 12px) clamp(12px, 2.8vmin, 18px);
        width: fit-content;
        max-width: min(88%, 440px);
        margin-left: auto;
        margin-right: auto;
        text-align: center;
        font: 800 clamp(11px, 2.9vmin, 13px) / 1.35 system-ui, sans-serif;
        letter-spacing: 0.01em;
        color: rgba(255, 249, 239, 0.96);
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.75);
        background: linear-gradient(180deg, rgba(59, 33, 36, 0.72), rgba(24, 20, 29, 0.78));
        border: 1px solid rgba(255, 231, 189, 0.16);
        border-radius: clamp(12px, 3vmin, 16px);
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        pointer-events: none;
      }

      .start-cooking-btn {
        position: absolute;
        left: 50%;
        top: 28%;
        z-index: 12;
        width: min(88%, 470px);
        padding: 0;
        border: none;
        background: transparent;
        transform: translate(-50%, -50%);
        cursor: pointer;
        touch-action: manipulation;
        pointer-events: auto;
        filter: drop-shadow(0 16px 30px rgba(0, 0, 0, 0.42));
        animation: startCookingFloat 1.9s ease-in-out infinite;
        transform-origin: center center;
      }

      .start-cooking-btn::before {
        content: '';

                <span id="customers-value" class="game-hud__customers-value">0</span>
              </div>
              <div class="game-hud__timer-slot">
                <div class="game-hud__timer-anchor">
                  <div class="game-hud__timer" id="game-timer-block" aria-live="polite" aria-atomic="true">
                    <img class="game-hud__timer-icon" src="./assets/textures/timer.png" alt="" aria-hidden="true" />
                    <div class="game-hud__timer-track">
                      <div class="game-hud__timer-fill" id="game-timer-fill" style="width:100%"></div>
                    </div>
                  </div>
                  <span id="game-timer-bonus" class="game-hud__timer-bonus" aria-hidden="true"></span>
                </div>
              </div>
              <div class="game-hud__coins" id="coins-display" aria-live="polite" aria-atomic="true">
                <span id="coins-value" class="game-hud__coins-value">0</span>
                <img class="game-hud__coins-icon" src="./assets/ui/coin.png" alt="" aria-hidden="true" draggable="false" />
              </div>
            </div>
          </div>
          <!-- info button removed -->

          <button type="button" class="hud-sound-btn" id="hud-sound-btn" aria-label="Toggle sound">
            <svg class="hud-sound-btn__icon" id="sound-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <svg class="hud-sound-btn__icon" id="sound-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <div id="hud-info-modal" class="hud-info-modal" aria-hidden="true" role="dialog" aria-labelledby="hud-info-title">
            <div class="hud-info-modal__panel">
              <button type="button" class="hud-info-modal__close" id="hud-info-close" aria-label="Close">×</button>
              <p id="hud-info-title" class="hud-info-modal__text">
                Tap a pile to build — bun first. Tap the dog to clear your plate.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
